const hexPoints = (cx, cy, r) => Array.from({length:6},(_, k) => { const a=(Math.PI/3)*k-Math.PI/6; return (cx+r*Math.cos(a))+","+(cy+r*Math.sin(a)); }).join(" ");
const HexBg = () => (

  </svg>
);

);

// ── Count Modal (big tap buttons) ─────────────────────────────────
function CountModal({ item, onClose, onChange }) {
  if (!item) return null;
  const st = getStatus(item.count, item.req);
  const need = Math.max(0, item.req - item.count);
  const stColor = st === "empty" ? C.danger : st === "low" ? C.warning : C.success;
  const [bump, setBump] = useState(false);
  const triggerBump = () => { setBump(true); setTimeout(() => setBump(false), 220); };

  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.72)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 100, animation: "fadeIn 0.15s ease" }}>
      <div onClick={e => e.stopPropagation()} style={{ width: "100%", maxWidth: 480, background: C.card, borderRadius: "24px 24px 0 0", padding: "10px 20px 32px", border: "1px solid " + C.border, borderBottom: "none", animation: "popIn 0.22s cubic-bezier(0.34,1.56,0.64,1)" }}>
        {/* Grabber */}
        <div style={{ width: 40, height: 4, background: C.border, borderRadius: 4, margin: "6px auto 18px" }} />

        {/* Item title */}

        </div>

        {/* Status */}
        <div style={{ display: "flex", justifyContent: "center", margin: "14px 0 8px" }}>
          <span style={{ background: stColor + "22", color: stColor, fontSize: 13, fontWeight: 700, padding: "5px 16px", borderRadius: 20 }}>
            {st === "ok" ? "✓ ครบตามกำหนด" : st === "low" ? "! ยังไม่พอ" : "✕ หมด/ยังไม่นับ"}
          </span>
        </div>

        {/* Big counter */}
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 20, margin: "18px 0 8px" }}>
          <button onClick={() => { onChange(item.id, -1); triggerBump(); }}
            style={{ width: 74, height: 74, borderRadius: 22, border: "none", background: C.cardEl, color: C.text, fontSize: 38, fontWeight: 300, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 4px 14px rgba(0,0,0,0.3)" }}>−</button>
          <div style={{ minWidth: 100, textAlign: "center" }}>
            <div style={{ color: C.text, fontSize: 56, fontWeight: 700, lineHeight: 1, animation: bump ? "bump 0.22s ease" : "none" }}>{item.count}</div>
            <div style={{ color: C.textMute, fontSize: 14, marginTop: 4 }}>{item.unit}</div>
          </div>
          <button onClick={() => { onChange(item.id, 1); triggerBump(); }}
            style={{ width: 74, height: 74, borderRadius: 22, border: "none", background: C.orange, color: "#fff", fontSize: 38, fontWeight: 300, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 4px 18px " + C.orange + "66" }}>+</button>
        </div>

        {/* Quick add buttons */}
        <div style={{ display: "flex", gap: 8, justifyContent: "center", margin: "16px 0 18px" }}>
          {[5, 10].map(n => (

          <span style={{ color: need > 0 ? C.orangeL : C.success, fontSize: 14, fontWeight: 500 }}>{need > 0 ? "ต้องเบิกเพิ่ม" : "ไม่ต้องเบิก"}</span>

function App() {
  const [page, setPage] = useState("home"); // home | pick | items

    const saved = loadSaved();

  });

  const persist = useCallback((list) => { const obj = {}; list.forEach(it => { obj[it.id] = it.count; }); saveData(obj); }, []);

  const changeCount = useCallback((id, delta) => {
    setItems(prev => {
      const next = prev.map(it => {
        if (it.id !== id) return it;
        if (delta === "zero") return { ...it, count: 0 };
        return { ...it, count: Math.max(0, it.count + delta) };
      });
      persist(next); return next;
    });
  }, [persist]);

  const removeItem = useCallback((id) => { setItems(prev => { const next = prev.filter(it => it.id !== id); persist(next); return next; }); }, [persist]);
  const resetCat = useCallback((cat) => { setItems(prev => { const next = prev.map(it => it.cat === cat ? { ...it, count: 0 } : it); persist(next); return next; }); }, [persist]);

  const allNeed = items.filter(it => it.count < it.req).length;
  const modalItem = modalId ? items.find(it => it.id === modalId) : null;

  const exportCSV = (cat) => {
    const list = items.filter(it => it.cat === cat);
    let csv = "\uFEFF";
    csv += "หน่วยงาน,ห้องคลอด รพ.สะบ้าย้อย\n";
    csv += "หมวด," + CAT_META[cat].label + "\n";
    csv += "วันที่ส่งออก," + new Date().toLocaleString("th-TH") + "\n\n";
    csv += "รายการ,หน่วย,ต้องมี,นับได้,ต้องเบิก,สถานะ\n";
    list.forEach(it => {
      const need = Math.max(0, it.req - it.count);
      const st = getStatus(it.count, it.req) === "ok" ? "ครบ" : it.count > 0 ? "ไม่พอ" : "หมด";
      csv += ['"' + it.name + '"', it.unit, it.req, it.count, need, st].join(",") + "\n";
    });
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "เบิกของ_" + CAT_META[cat].label + "_" + new Date().toISOString().slice(0,10) + ".csv";
    a.click(); URL.revokeObjectURL(url);
  };

  if (page === "home") return (

      <div style={{ position: "absolute", bottom: -30, left: -30, opacity: 0.28 }}><HexIcon size={120} color={C.orange} /></div>
      <div style={{ position: "absolute", bottom: 90, left: 54, opacity: 0.13 }}><HexIcon size={60} color="#fff" /></div>

      {/* Top label */}
      <div style={{ padding: "48px 36px 0", zIndex: 1 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <HexIcon size={26} color={C.orange} />
          <span style={{ color: C.textSub, fontSize: 12, letterSpacing: "0.12em" }}>ห้องคลอด โรงพยาบาลสะบ้าย้อย</span>
        </div>
      </div>

      {/* Center content */}
      <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "0 36px", zIndex: 1 }}>
        <div style={{ textAlign: "center", marginBottom: 40 }}>
          <div style={{ color: C.text, fontSize: 30, fontWeight: 700, lineHeight: 1.25 }}>ระบบเช็คสต็อก</div>
          <div style={{ color: C.orange, fontSize: 30, fontWeight: 700, lineHeight: 1.25 }}>เวชภัณฑ์ห้องคลอด</div>
        </div>

        {/* Big hexagon button */}
        <button onClick={() => setPage("pick")} aria-label="เริ่มต้นเบิกของ"
          style={{ position: "relative", width: 200, height: 220, border: "none", background: "none", cursor: "pointer", padding: 0 }}>
          <svg width="200" height="220" viewBox="0 0 200 220" style={{ filter: "drop-shadow(0 12px 40px " + C.orange + "66)" }}>
            <defs>
              <linearGradient id="hexgrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={C.orangeL} />
                <stop offset="100%" stopColor={C.orangeD} />
              </linearGradient>
            </defs>
            <polygon points="100,10 185,60 185,160 100,210 15,160 15,60" fill="url(#hexgrad)" />
          </svg>
          <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 10, pointerEvents: "none" }}>
            <div style={{ width: 56, height: 56, borderRadius: "50%", background: "rgba(255,255,255,0.22)", display: "flex", alignItems: "center", justifyContent: "center" }}>
              <svg width="30" height="30" fill="none" stroke="#fff" strokeWidth="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" strokeLinecap="round" /></svg>
            </div>
            <span style={{ color: "#fff", fontSize: 17, fontWeight: 700 }}>เริ่มต้นเบิกของ</span>
          </div>
        </button>
        <div style={{ color: C.textMute, fontSize: 12, marginTop: 24, textAlign: "center" }}>แตะปุ่มเพื่อเลือกหมวดและเริ่มนับสต็อก</div>
      </div>

      {allNeed > 0 && (
        <div style={{ margin: "0 24px 32px", background: C.card, borderRadius: 16, padding: "14px 18px", border: "1px solid " + C.border, display: "flex", alignItems: "center", gap: 12, zIndex: 1 }}>
          <div style={{ width: 34, height: 34, background: C.danger + "22", borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
            <svg width="17" height="17" fill="none" stroke={C.danger} strokeWidth="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" /><path d="M12 8v4M12 16h.01" strokeLinecap="round" /></svg>
          </div>
          <div>
            <div style={{ color: C.text, fontSize: 13, fontWeight: 500 }}>มีรายการที่ต้องเบิก</div>
            <div style={{ color: C.danger, fontSize: 12 }}>{allNeed} รายการยังไม่ครบตามกำหนด</div>
          </div>
        </div>
      )}
    </div>
  );

  // ═══ PICK CATEGORY ══════════════════════════════════════════════
  if (page === "pick") return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%", background: C.bg, position: "relative", overflow: "hidden" }}>
      <HexBg />
      <div style={{ padding: "18px 18px 8px", zIndex: 1 }}>
        <button onClick={() => setPage("home")} style={{ width: 38, height: 38, background: C.cardEl, border: "none", borderRadius: 11, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
          <svg width="17" height="17" fill="none" stroke={C.text} strokeWidth="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7" strokeLinecap="round" strokeLinejoin="round" /></svg>
        </button>
      </div>

      <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", padding: "0 24px 40px", zIndex: 1 }}>
        <div style={{ marginBottom: 28, textAlign: "center" }}>
          <div style={{ color: C.text, fontSize: 24, fontWeight: 700 }}>เลือกหมวดการเบิก</div>
          <div style={{ color: C.textMute, fontSize: 13, marginTop: 6 }}>เลือกหมวดที่ต้องการทำรายการ</div>
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          {CATS.map(cat => {
            const meta = CAT_META[cat];
            const list = items.filter(it => it.cat === cat);
            const need = list.filter(it => it.count < it.req).length;
            return (
              <button key={cat} onClick={() => { setActiveCat(cat); setSearch(""); setPage("items"); }}
                style={{ display: "flex", alignItems: "center", gap: 16, background: C.card, border: "1px solid " + C.border, borderLeft: "4px solid " + meta.color, borderRadius: 18, padding: "18px 20px", cursor: "pointer", textAlign: "left" }}>
                <div style={{ width: 52, height: 52, borderRadius: 15, background: meta.color + "1E", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  <svg width="26" height="26" fill="none" stroke={meta.color} strokeWidth="1.8" viewBox="0 0 24 24"><path d={meta.icon} strokeLinecap="round" strokeLinejoin="round" /></svg>
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ color: C.text, fontSize: 18, fontWeight: 600 }}>{meta.label}</div>
                  <div style={{ color: C.textMute, fontSize: 12, marginTop: 2 }}>{meta.desc}</div>
                  <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
                    <span style={{ color: C.textSub, fontSize: 11 }}>{list.length} รายการ</span>
                    {need > 0 && <span style={{ color: C.danger, fontSize: 11, fontWeight: 600 }}>· ต้องเบิก {need}</span>}
                  </div>
                </div>
                <svg width="20" height="20" fill="none" stroke={C.textMute} strokeWidth="2" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6" strokeLinecap="round" strokeLinejoin="round" /></svg>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );

  // ═══ ITEMS (per category) ═══════════════════════════════════════
  const meta = CAT_META[activeCat];
  const catItems = items.filter(it => it.cat === activeCat);
  const filtered = catItems.filter(it => it.name.toLowerCase().includes(search.toLowerCase()));
  const totalCat = catItems.length;
  const needCat = catItems.filter(it => it.count < it.req).length;
  const doneCat = totalCat - needCat;

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%", background: C.bg, overflowY: "auto" }}>
      {/* Header */}
      <div style={{ background: C.card, borderBottom: "1px solid " + C.border, borderTop: "3px solid " + meta.color, padding: "14px 18px", flexShrink: 0, position: "sticky", top: 0, zIndex: 10 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <button onClick={() => { setPage("pick"); setSearch(""); }} style={{ width: 36, height: 36, background: C.cardEl, border: "none", borderRadius: 10, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
              <svg width="16" height="16" fill="none" stroke={C.text} strokeWidth="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7" strokeLinecap="round" strokeLinejoin="round" /></svg>
            </button>
            <div>
              <div style={{ color: C.text, fontWeight: 600, fontSize: 15, display: "flex", alignItems: "center", gap: 7 }}>
                <span style={{ width: 8, height: 8, borderRadius: "50%", background: meta.color, display: "inline-block" }} />{meta.label}
              </div>
              <div style={{ color: C.textSub, fontSize: 11, marginTop: 1 }}>{totalCat} รายการ{needCat > 0 && <span style={{ color: C.danger, marginLeft: 6 }}>· ต้องเบิก {needCat}</span>}</div>
            </div>
          </div>
          <div style={{ display: "flex", gap: 6 }}>
            <button onClick={() => exportCSV(activeCat)} style={{ padding: "6px 12px", background: C.cardEl, border: "1px solid " + C.border, borderRadius: 8, cursor: "pointer", color: meta.color, fontSize: 11, display: "flex", alignItems: "center", gap: 4 }}>
              <svg width="12" height="12" fill="none" stroke={meta.color} strokeWidth="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3" strokeLinecap="round" strokeLinejoin="round" /></svg>
              ส่งออก
            </button>
            <button onClick={() => resetCat(activeCat)} style={{ padding: "6px 12px", background: C.cardEl, border: "1px solid " + C.border, borderRadius: 8, cursor: "pointer", color: C.textSub, fontSize: 11 }}>รีเซ็ต</button>
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8, background: C.cardEl, borderRadius: 10, padding: "8px 12px", border: "1px solid " + C.border }}>
          <svg width="14" height="14" fill="none" stroke={C.textMute} strokeWidth="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" /><path d="M21 21l-4.35-4.35" strokeLinecap="round" /></svg>
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder={"ค้นหาใน " + meta.label + "..."} style={{ flex: 1, background: "none", border: "none", outline: "none", color: C.text, fontSize: 13 }} />
        </div>
      </div>

      {/* Summary banner */}
      {needCat > 0 && (
        <div style={{ margin: "12px 16px 0", background: "linear-gradient(135deg, " + meta.color + "CC, " + meta.color + "99)", borderRadius: 12, padding: "12px 16px", display: "flex", alignItems: "center", gap: 10 }}>
          <svg width="18" height="18" fill="none" stroke="#fff" strokeWidth="2" viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" strokeLinecap="round" strokeLinejoin="round" /></svg>
          <div style={{ flex: 1, color: "#fff", fontSize: 12, fontWeight: 600 }}>สรุปยอดที่ต้องเบิก · {meta.label}</div>
          <div style={{ background: "rgba(0,0,0,0.28)", color: "#fff", fontSize: 11, fontWeight: 700, padding: "4px 10px", borderRadius: 20 }}>ต้องเบิก {needCat}</div>
        </div>
      )}

      {/* Progress */}
      <div style={{ padding: "10px 16px 4px", display: "flex", alignItems: "center", gap: 8 }}>
        <div style={{ flex: 1, height: 4, background: C.cardEl, borderRadius: 2, overflow: "hidden" }}>
          <div style={{ height: "100%", width: (totalCat ? (doneCat/totalCat)*100 : 0) + "%", background: meta.color, borderRadius: 2, transition: "width 0.3s" }} />
        </div>
        <span style={{ color: C.textMute, fontSize: 10 }}>{doneCat}/{totalCat}</span>
      </div>

      {/* Items */}
      <div style={{ flex: 1, padding: "8px 16px 24px" }}>
        {filtered.length === 0 ? (
          <div style={{ textAlign: "center", color: C.textMute, fontSize: 13, padding: "40px 0" }}>ไม่พบรายการ</div>
        ) : filtered.map(item => {
          const st = getStatus(item.count, item.req);
          const pct = Math.min(1, item.count / item.req);
          const need = Math.max(0, item.req - item.count);
          const stColor = st === "empty" ? C.danger : st === "low" ? C.warning : C.success;
          return (
            <div key={item.id} onClick={() => setModalId(item.id)}
              style={{ background: C.card, borderRadius: 14, padding: "14px 16px", marginBottom: 10, border: "1px solid " + (st === "empty" ? C.danger + "40" : st === "low" ? C.warning + "30" : C.border), cursor: "pointer" }}>
              <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 10 }}>
                <div style={{ flex: 1, paddingRight: 8 }}>
                  <div style={{ color: C.text, fontSize: 14, fontWeight: 500, lineHeight: 1.4 }}>{item.name}</div>
                  <div style={{ color: C.textMute, fontSize: 11, marginTop: 3 }}>{meta.label} · ต้องมีในคลัง {item.req} {item.unit}</div>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ background: stColor + "22", color: stColor, fontSize: 10, fontWeight: 700, padding: "3px 8px", borderRadius: 6 }}>{st === "ok" ? "ครบ" : st === "low" ? "ไม่พอ" : "หมด"}</span>
                  <button onClick={(e) => { e.stopPropagation(); removeItem(item.id); }} style={{ background: "none", border: "none", cursor: "pointer", padding: 2, color: C.textMute }}>
                    <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2" /></svg>
                  </button>
                </div>
              </div>
              <div style={{ height: 3, background: C.cardEl, borderRadius: 2, marginBottom: 12, overflow: "hidden" }}>
                <div style={{ height: "100%", width: (pct*100) + "%", background: stColor, borderRadius: 2, transition: "width 0.2s" }} />
              </div>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <button onClick={(e) => { e.stopPropagation(); changeCount(item.id, -1); }} style={{ width: 34, height: 34, borderRadius: 10, border: "1px solid " + C.border, background: C.cardEl, color: C.text, fontSize: 18, cursor: "pointer" }}>−</button>
                  <span style={{ color: C.text, fontSize: 16, fontWeight: 600, minWidth: 24, textAlign: "center" }}>{item.count}</span>
                  <button onClick={(e) => { e.stopPropagation(); changeCount(item.id, 1); }} style={{ width: 34, height: 34, borderRadius: 10, border: "1px solid " + C.border, background: C.cardEl, color: C.text, fontSize: 18, cursor: "pointer" }}>+</button>
                  <span style={{ color: C.textMute, fontSize: 12 }}>{item.unit}</span>
                </div>
                {need > 0 && (
                  <div style={{ textAlign: "right" }}>
                    <div style={{ color: C.textMute, fontSize: 10 }}>ต้องเบิก</div>
                    <div style={{ color: meta.color, fontSize: 16, fontWeight: 700 }}>{need} <span style={{ fontSize: 11 }}>{item.unit}</span></div>
                  </div>
                )}
              </div>
              <div style={{ textAlign: "center", marginTop: 8, color: C.textMute, fontSize: 10 }}>แตะที่การ์ดเพื่อเปิดปุ่มนับใหญ่</div>
            </div>
          );
        })}
      </div>

      <CountModal item={modalItem} onClose={() => setModalId(null)} onChange={changeCount} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
