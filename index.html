// ── POST to Google Sheet (via Apps Script, no-cors) ───────────────
async function postToSheet(payload) {
  const URL_ = getScriptUrl();
  if (!URL_) return { ok: false, reason: "no-url" };
  try {
    await fetch(URL_, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload),
    });
    return { ok: true }; // no-cors = opaque response, assume success
  } catch (e) {
    return { ok: false, reason: "network" };
  }
}

// ── Count Modal ───────────────────────────────────────────────────
function CountModal({ item, lastW, onClose, onChange }) {
  const [bump, setBump] = useState(false);
  if (!item) return null;
  const st = getStatus(item.count, item.req);
  const need = Math.max(0, item.req - item.count);
  const stColor = st === "empty" ? C.danger : st === "low" ? C.warning : C.success;
  const triggerBump = () => { setBump(true); setTimeout(() => setBump(false), 220); };
  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.72)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 100, animation: "fadeIn 0.15s ease" }}>

        <div style={{ width: 40, height: 4, background: C.border, borderRadius: 4, margin: "6px auto 18px" }} />
        <div style={{ textAlign: "center", marginBottom: 4 }}>
          <div style={{ color: C.text, fontSize: 19, fontWeight: 600, lineHeight: 1.3 }}>{item.name}</div>

        </div>
        {lastW && (
          <div style={{ background: C.cardEl, borderRadius: 12, padding: "12px 14px", margin: "12px 0 4px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 8 }}>

              <span style={{ color: C.textMute }}>จำนวนที่เบิก</span>
              <span style={{ color: C.text, fontWeight: 600 }}>{lastW.qty} {item.unit}</span>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", padding: "3px 0", fontSize: 12 }}>
              <span style={{ color: C.textMute }}>วันที่เบิก</span>
              <span style={{ color: C.text }}>{fmtDate(lastW.date)}</span>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", padding: "3px 0", fontSize: 12 }}>
              <span style={{ color: C.textMute }}>ผู้เบิก</span>
              <span style={{ color: lastW.by ? C.text : C.textMute }}>{lastW.by || "—"}</span>
            </div>
          </div>
        )}
        <div style={{ display: "flex", justifyContent: "center", margin: "14px 0 8px" }}>
          <span style={{ background: stColor + "22", color: stColor, fontSize: 13, fontWeight: 700, padding: "5px 16px", borderRadius: 20 }}>{st === "ok" ? "✓ ครบตามกำหนด" : st === "low" ? "! ยังไม่พอ" : "✕ หมด/ยังไม่นับ"}</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 20, margin: "18px 0 8px" }}>
          <button onClick={() => { onChange(item.id, -1); triggerBump(); }} style={{ width: 74, height: 74, borderRadius: 22, border: "none", background: C.cardEl, color: C.text, fontSize: 38, fontWeight: 300, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 4px 14px rgba(0,0,0,0.3)" }}>−</button>

            <div style={{ color: C.textMute, fontSize: 14, marginTop: 4 }}>{item.unit}</div>
          </div>
          <button onClick={() => { onChange(item.id, 1); triggerBump(); }} style={{ width: 74, height: 74, borderRadius: 22, border: "none", background: C.orange, color: "#fff", fontSize: 38, fontWeight: 300, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 4px 18px " + C.orange + "66" }}>+</button>

}

  const [urlInput, setUrlInput] = useState(() => getScriptUrl());
  const scriptConfigured = !!getScriptUrl();
  const [requester, setRequester] = useState(() => { try { return localStorage.getItem("withdraw-requester") || ""; } catch { return ""; } });

  // Last withdrawal per item id (from history, most recent)
  const lastWithdrawMap = React.useMemo(() => {
    const m = {};
    history.forEach(batch => batch.items.forEach(it => {
      if (it.id == null) return;
      if (!m[it.id] || new Date(batch.date) > new Date(m[it.id].date)) m[it.id] = { qty: it.qty, date: batch.date, by: batch.requester || "" };
    }));
    return m;
  }, [history]);

  // Try fetch history from sheet on load (best-effort; falls back to localStorage)
  useEffect(() => {
    const URL_ = getScriptUrl();
    if (!URL_) return;
    fetch(URL_ + "?action=history")
      .then(r => r.json())
      .then(d => { if (d && Array.isArray(d.batches) && d.batches.length) { setHistory(d.batches); saveHistory(d.batches); } })
      .catch(() => {});
  }, []);

  const persist = useCallback((list) => { const obj = {}; list.forEach(it => { obj[it.id] = it.count; }); saveData(obj); }, []);
  const changeCount = useCallback((id, delta) => {
    setItems(prev => { const next = prev.map(it => { if (it.id !== id) return it; if (delta === "zero") return { ...it, count: 0 }; return { ...it, count: Math.max(0, it.count + delta) }; }); persist(next); return next; });
  }, [persist]);
  const removeItem = useCallback((id) => { setItems(prev => { const next = prev.filter(it => it.id !== id); persist(next); return next; }); }, [persist]);
  const resetCat = useCallback((cat) => { setItems(prev => { const next = prev.map(it => it.cat === cat ? { ...it, count: 0 } : it); persist(next); return next; }); }, [persist]);

  const deleteHistoryBatch = useCallback((idx, batch) => {
    if (batch && batch.batchId) postToSheet({ action: "delete", batchId: batch.batchId });
    setHistory(prev => { const next = prev.filter((_, i) => i !== idx); saveHistory(next); return next; });
  }, []);
  const clearAllHistory = useCallback(() => {
    postToSheet({ action: "clearAll" });
    setHistory([]); saveHistory([]);
  }, []);

  const allNeed = items.filter(it => it.count < it.req).length;
  const modalItem = modalId ? items.find(it => it.id === modalId) : null;

  // Build withdrawal summary (items with need > 0)
  const buildSummary = (scope) => {
    const cats = scope === "all" ? CATS : [scope];
    return cats.map(cat => {
      const list = items.filter(it => it.cat === cat && (it.req - it.count) > 0).map(it => ({ id: it.id, name: it.name, unit: it.unit, qty: it.req - it.count }));
      return { cat, items: list };
    }).filter(g => g.items.length > 0);
  };

  const openExport = (scope) => { setExportScope(scope); setPage("export"); };

  // ═══ HOME ═══════════════════════════════════════════════════════
  if (page === "home") return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%", background: C.bg, position: "relative", overflow: "hidden" }}>
      <HexBg />
      <div style={{ position: "absolute", top: -20, right: -20, opacity: 0.4 }}><HexIcon size={110} color={C.orange} /></div>
      <div style={{ position: "absolute", top: 70, right: 46, opacity: 0.2 }}><HexIcon size={60} color={C.orange} /></div>
      <div style={{ position: "absolute", bottom: -30, left: -30, opacity: 0.28 }}><HexIcon size={120} color={C.orange} /></div>
      <div style={{ position: "absolute", bottom: 90, left: 54, opacity: 0.13 }}><HexIcon size={60} color="#fff" /></div>
      <div style={{ padding: "40px 22px 0", zIndex: 1, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <HexIcon size={26} color={C.orange} />
          <span style={{ color: C.textSub, fontSize: 12, letterSpacing: "0.12em" }}>ห้องคลอด โรงพยาบาลสะบ้าย้อย</span>
        </div>
        <button onClick={() => { setUrlInput(getScriptUrl()); setPage("settings"); }} title="ตั้งค่า" style={{ width: 38, height: 38, background: C.card, border: "1px solid " + C.border, borderRadius: 11, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", position: "relative" }}>

        </div>

        </button>

                    <svg width="16" height="16" fill="none" stroke={C.danger} strokeWidth="1.6" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2" /></svg>
                  </button>
                </div>
              </div>
              {batch.items.map((it, ii) => (
                <div key={ii} style={{ display: "flex", justifyContent: "space-between", padding: "4px 0", fontSize: 12 }}>
                  <span style={{ color: C.textSub }}>{CAT_META[it.cat] ? CAT_META[it.cat].label + " · " : ""}{it.name}</span>
                  <span style={{ color: C.text, fontWeight: 600 }}>{it.qty} {it.unit}</span>
                </div>
              ))}
            </div>
          ))
        }
      </div>
    </div>
  );

  // ═══ SETTINGS ═══════════════════════════════════════
  if (page === "settings") {
    const saveUrl = () => {
      const u = urlInput.trim();
      setScriptUrl(u);
      alert(u ? "\u0e1a\u0e31\u0e19\u0e17\u0e36\u0e01 URL \u0e40\u0e23\u0e35\u0e22\u0e1a\u0e23\u0e49\u0e2d\u0e22\u0e41\u0e25\u0e49\u0e27" : "\u0e25\u0e49\u0e32\u0e07 URL \u0e41\u0e25\u0e49\u0e27");
      setPage("home");
    };
    const testUrl = async () => {
      const u = urlInput.trim();
      if (!u) { alert("\u0e01\u0e23\u0e38\u0e13\u0e32\u0e43\u0e2a\u0e48 URL \u0e01\u0e48\u0e2d\u0e19"); return; }
      setScriptUrl(u);
      try {
        const r = await fetch(u + "?action=history");
        const d = await r.json();
        if (d && d.status === "ok") {
          const hasDelete = d.version && (d.version.indexOf("v2") === 0 || d.version.indexOf("v3") === 0);
          alert("\u2713 \u0e40\u0e0a\u0e37\u0e48\u0e2d\u0e21\u0e2a\u0e33\u0e40\u0e23\u0e47\u0e08! \u0e1e\u0e1a\u0e1b\u0e23\u0e30\u0e27\u0e31\u0e15\u0e34 " + (d.batches ? d.batches.length : 0) + " \u0e04\u0e23\u0e31\u0e49\u0e07\n" + (hasDelete ? "\u2713 \u0e23\u0e2d\u0e07\u0e23\u0e31\u0e1a\u0e01\u0e32\u0e23\u0e25\u0e1a\u0e1b\u0e23\u0e30\u0e27\u0e31\u0e15\u0e34 (\u0e42\u0e04\u0e49\u0e14\u0e43\u0e2b\u0e21\u0e48)" : "\u26a0 \u0e22\u0e31\u0e07\u0e40\u0e1b\u0e47\u0e19\u0e42\u0e04\u0e49\u0e14\u0e40\u0e01\u0e48\u0e32 \u2014 \u0e15\u0e49\u0e2d\u0e07 redeploy \u0e41\u0e1a\u0e1a New version \u0e40\u0e1e\u0e37\u0e48\u0e2d\u0e43\u0e2b\u0e49\u0e25\u0e1a\u0e1b\u0e23\u0e30\u0e27\u0e31\u0e15\u0e34\u0e44\u0e14\u0e49"));
        }
        else alert("\u0e40\u0e0a\u0e37\u0e48\u0e2d\u0e21\u0e44\u0e14\u0e49 \u0e41\u0e15\u0e48\u0e23\u0e39\u0e1b\u0e41\u0e1a\u0e1a\u0e02\u0e49\u0e2d\u0e21\u0e39\u0e25\u0e44\u0e21\u0e48\u0e15\u0e23\u0e07 \u0e15\u0e23\u0e27\u0e08\u0e42\u0e04\u0e49\u0e14 Apps Script");
      } catch (e) {
        alert("\u26a0 \u0e40\u0e0a\u0e37\u0e48\u0e2d\u0e21\u0e44\u0e21\u0e48\u0e2a\u0e33\u0e40\u0e23\u0e47\u0e08 (\u0e01\u0e32\u0e23\u0e2d\u0e48\u0e32\u0e19\u0e2d\u0e32\u0e08\u0e16\u0e39\u0e01 CORS \u0e1a\u0e25\u0e47\u0e2d\u0e01 \u0e41\u0e15\u0e48\u0e01\u0e32\u0e23\u0e1a\u0e31\u0e19\u0e17\u0e36\u0e01\u0e22\u0e31\u0e07\u0e17\u0e33\u0e07\u0e32\u0e19\u0e44\u0e14\u0e49)");

            const need = list.filter(it => it.count < it.req).length;
            return (
              <button key={cat} onClick={() => { setActiveCat(cat); setSearch(""); setPage("items"); }} style={{ display: "flex", alignItems: "center", gap: 16, background: C.card, border: "1px solid " + C.border, borderLeft: "4px solid " + meta.color, borderRadius: 18, padding: "18px 20px", cursor: "pointer", textAlign: "left" }}>
                <div style={{ width: 52, height: 52, borderRadius: 15, background: meta.color + "1E", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  <svg width="26" height="26" fill="none" stroke={meta.color} strokeWidth="1.8" viewBox="0 0 24 24"><path d={meta.icon} strokeLinecap="round" strokeLinejoin="round" /></svg>
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ color: C.text, fontSize: 18, fontWeight: 600 }}>{meta.label}</div>
                  <div style={{ color: C.textMute, fontSize: 12, marginTop: 2 }}>{meta.desc}</div>
                  <div style={{ display: "flex", gap: 10, marginTop: 8 }}><span style={{ color: C.textSub, fontSize: 11 }}>{list.length} รายการ</span>{need > 0 && <span style={{ color: C.danger, fontSize: 11, fontWeight: 600 }}>· ต้องเบิก {need}</span>}</div>
                </div>
                <svg width="20" height="20" fill="none" stroke={C.textMute} strokeWidth="2" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6" strokeLinecap="round" strokeLinejoin="round" /></svg>
              </button>
            );
          })}
        </div>
        <button onClick={() => openExport("all")} style={{ marginTop: 20, background: "none", border: "1px dashed " + C.border, borderRadius: 14, padding: "14px", color: C.orangeL, fontSize: 13, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
          <svg width="16" height="16" fill="none" stroke={C.orangeL} strokeWidth="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3" strokeLinecap="round" strokeLinejoin="round" /></svg>
          สรุป & ส่งออกทุกหมวด
        </button>
      </div>
    </div>
  );

  // ═══ EXPORT / SUMMARY ═══════════════════════════════════════════
  if (page === "export") {
    const summary = buildSummary(exportScope);
    const totalQty = summary.reduce((s, g) => s + g.items.reduce((a, b) => a + b.qty, 0), 0);
    const totalItems = summary.reduce((s, g) => s + g.items.length, 0);
    const scopeLabel = exportScope === "all" ? "ทุกหมวด" : CAT_META[exportScope].label;
    const dateStr = fmtDate(new Date());

    const exportPDF = () => window.print();
    const exportImage = async () => {
      if (!summaryRef.current || !window.html2canvas) { alert("ไม่สามารถสร้างรูปได้"); return; }
      const canvas = await window.html2canvas(summaryRef.current, { backgroundColor: "#ffffff", scale: 2 });
      const a = document.createElement("a");
      a.href = canvas.toDataURL("image/png");
      a.download = "สรุปการเบิก_" + scopeLabel + "_" + new Date().toISOString().slice(0,10) + ".png";
      a.click();
    };
    const exportCSV = () => {
      let csv = "\uFEFF";
      csv += "หน่วยงาน,ห้องคลอด รพ.สะบ้าย้อย\n";
      csv += "สรุปการเบิก," + scopeLabel + "\n";
      csv += "วันที่," + dateStr + "\n\n";
      csv += "หมวด,รายการ,จำนวนที่เบิก,หน่วย\n";
      summary.forEach(g => g.items.forEach(it => { csv += [CAT_META[g.cat].label, '"'+it.name+'"', it.qty, it.unit].join(",") + "\n"; }));
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a"); a.href = url; a.download = "สรุปการเบิก_" + scopeLabel + "_" + new Date().toISOString().slice(0,10) + ".csv"; a.click(); URL.revokeObjectURL(url);
    };

    const confirmSave = async () => {
      if (totalItems === 0) { alert("ไม่มีรายการที่ต้องเบิก"); return; }
      setSaving(true);
      const batch = {
        batchId: "B" + Date.now(),
        date: new Date().toISOString(),
        org: "ห้องคลอด รพ.สะบ้าย้อย",
        scope: scopeLabel,
        requester: requester || "",
        items: summary.flatMap(g => g.items.map(it => ({ id: it.id, cat: g.cat, name: it.name, unit: it.unit, qty: it.qty }))),
      };
      // 1) save locally (immediate, reliable)
      const nextHist = [batch, ...history];
      setHistory(nextHist); saveHistory(nextHist);
      // 2) post to Google Sheet (best-effort)
      const res = await postToSheet({ action: "save", ...batch });
      setSaving(false);
      setSavedInfo({ count: batch.items.length, qty: totalQty, sheet: res.ok, noUrl: res.reason === "no-url" });
      setPage("saved");
    };

    return (
      <div style={{ display: "flex", flexDirection: "column", height: "100%", background: C.bg, overflowY: "auto" }}>
        <div style={{ background: C.card, borderBottom: "1px solid " + C.border, padding: "14px 18px", position: "sticky", top: 0, zIndex: 10, display: "flex", alignItems: "center", gap: 10 }}>
          <button onClick={() => setPage(activeCat ? "items" : "pick")} style={{ width: 36, height: 36, background: C.cardEl, border: "none", borderRadius: 10, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
            <svg width="16" height="16" fill="none" stroke={C.text} strokeWidth="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7" strokeLinecap="round" strokeLinejoin="round" /></svg>
          </button>
          <div><div style={{ color: C.text, fontWeight: 600, fontSize: 15 }}>สรุปการเบิก</div><div style={{ color: C.textSub, fontSize: 11 }}>{scopeLabel} · {totalItems} รายการ</div></div>
        </div>

        {/* Scope switch */}
        <div style={{ display: "flex", gap: 6, padding: "12px 16px 4px", flexWrap: "wrap" }}>
          {["all", ...CATS].map(sc => {
            const active = exportScope === sc;
            const lbl = sc === "all" ? "ทุกหมวด" : CAT_META[sc].label;
            return <button key={sc} onClick={() => setExportScope(sc)} style={{ padding: "6px 14px", borderRadius: 20, border: active ? "none" : "1px solid " + C.border, background: active ? C.orange : C.cardEl, color: active ? "#fff" : C.textSub, fontSize: 12, fontWeight: active ? 600 : 400, cursor: "pointer" }}>{lbl}</button>;
          })}
        </div>

        {/* Summary sheet (also the image capture target) */}
        <div style={{ flex: 1, padding: "8px 16px 16px" }}>
          <div ref={summaryRef} style={{ background: "#fff", borderRadius: 14, padding: "20px", color: "#111" }}>
            <div style={{ borderBottom: "2px solid #E8673A", paddingBottom: 10, marginBottom: 14 }}>
              <div style={{ fontSize: 17, fontWeight: 700, color: "#111" }}>ใบสรุปการเบิกเวชภัณฑ์</div>
              <div style={{ fontSize: 12, color: "#555", marginTop: 2 }}>ห้องคลอด โรงพยาบาลสะบ้าย้อย</div>
              <div style={{ fontSize: 11, color: "#888", marginTop: 4 }}>หมวด: {scopeLabel} · วันที่ {dateStr}{requester ? " · ผู้เบิก: " + requester : ""}</div>
            </div>
            {totalItems === 0 ? (
              <div style={{ textAlign: "center", color: "#999", fontSize: 13, padding: "24px 0" }}>ไม่มีรายการที่ต้องเบิกในหมวดนี้</div>
            ) : summary.map(g => (
              <div key={g.cat} style={{ marginBottom: 16 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 6 }}>
                  <span style={{ width: 10, height: 10, borderRadius: 2, background: CAT_META[g.cat].color, display: "inline-block" }} />
                  <span style={{ fontSize: 14, fontWeight: 700, color: "#111" }}>{CAT_META[g.cat].label}</span>
                  <span style={{ fontSize: 11, color: "#888" }}>({g.items.length} รายการ)</span>
                </div>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                  <thead><tr style={{ background: "#f4f4f4" }}>
                    <th style={{ textAlign: "left", padding: "5px 8px", border: "1px solid #ddd", width: "10%" }}>#</th>
                    <th style={{ textAlign: "left", padding: "5px 8px", border: "1px solid #ddd" }}>รายการ</th>
                    <th style={{ textAlign: "center", padding: "5px 8px", border: "1px solid #ddd", width: "26%" }}>จำนวนที่เบิก</th>
                  </tr></thead>
                  <tbody>
                    {g.items.map((it, i) => (
                      <tr key={it.id}>
                        <td style={{ padding: "5px 8px", border: "1px solid #eee", textAlign: "center", color: "#666" }}>{i+1}</td>
                        <td style={{ padding: "5px 8px", border: "1px solid #eee", color: "#111" }}>{it.name}</td>
                        <td style={{ padding: "5px 8px", border: "1px solid #eee", textAlign: "center", fontWeight: 700, color: "#E8673A" }}>{it.qty} {it.unit}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            ))}
            {totalItems > 0 && (
              <div style={{ marginTop: 8, paddingTop: 10, borderTop: "1px dashed #ccc", display: "flex", justifyContent: "space-between", fontSize: 13, fontWeight: 700, color: "#111" }}>
                <span>รวมทั้งหมด</span><span>{totalItems} รายการ · {totalQty} หน่วย</span>
              </div>
            )}
          </div>
        </div>

        {/* Export format buttons */}
        <div style={{ padding: "0 16px 8px" }}>
          <div style={{ color: C.textSub, fontSize: 12, marginBottom: 8 }}>เลือกรูปแบบการส่งออก</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
            {[
              { label: "PDF", sub: "พิมพ์/บันทึก", icon: "M9 13h6M9 17h3M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6z", fn: exportPDF },
              { label: "รูปภาพ", sub: "PNG", icon: "M3 5a2 2 0 012-2h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V5zM8.5 10a1.5 1.5 0 100-3 1.5 1.5 0 000 3zM21 15l-5-5L5 21", fn: exportImage },
              { label: "CSV", sub: "Excel", icon: "M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3", fn: exportCSV },
            ].map(b => (
              <button key={b.label} onClick={b.fn} disabled={totalItems===0} style={{ background: C.card, border: "1px solid " + C.border, borderRadius: 14, padding: "14px 8px", cursor: totalItems===0?"not-allowed":"pointer", opacity: totalItems===0?0.4:1, display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}>
                <svg width="22" height="22" fill="none" stroke={C.orangeL} strokeWidth="1.8" viewBox="0 0 24 24"><path d={b.icon} strokeLinecap="round" strokeLinejoin="round" /></svg>
                <div style={{ color: C.text, fontSize: 13, fontWeight: 600 }}>{b.label}</div>
                <div style={{ color: C.textMute, fontSize: 10 }}>{b.sub}</div>
              </button>
            ))}
          </div>
        </div>

        {/* Requester input */}
        <div style={{ padding: "0 16px 8px" }}>
          <div style={{ color: C.textSub, fontSize: 12, marginBottom: 8 }}>ผู้เบิก (ไม่บังคับ)</div>
          <div style={{ display: "flex", alignItems: "center", gap: 8, background: C.card, borderRadius: 12, padding: "10px 14px", border: "1px solid " + C.border }}>
            <svg width="16" height="16" fill="none" stroke={C.textMute} strokeWidth="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z" strokeLinecap="round" strokeLinejoin="round" /></svg>
            <input value={requester} onChange={e => { setRequester(e.target.value); try { localStorage.setItem("withdraw-requester", e.target.value); } catch {} }} placeholder="ชื่อผู้เบิก" style={{ flex: 1, background: "none", border: "none", outline: "none", color: C.text, fontSize: 13 }} />
          </div>
        </div>

        {/* Confirm save */}
        <div style={{ padding: "8px 16px 24px" }}>
          <button onClick={confirmSave} disabled={saving || totalItems===0} style={{ width: "100%", padding: "16px", borderRadius: 16, border: "none", background: totalItems===0 ? C.cardEl : "linear-gradient(135deg," + C.orangeL + "," + C.orangeD + ")", color: "#fff", fontSize: 16, fontWeight: 700, cursor: (saving||totalItems===0)?"not-allowed":"pointer", opacity: (saving||totalItems===0)?0.6:1, display: "flex", alignItems: "center", justifyContent: "center", gap: 10, boxShadow: totalItems===0?"none":"0 6px 24px " + C.orange + "55" }}>
            {saving ? (<><span style={{ width: 18, height: 18, border: "2px solid rgba(255,255,255,0.4)", borderTopColor: "#fff", borderRadius: "50%", animation: "spin 0.7s linear infinite" }} />กำลังบันทึก...</>) : (<><svg width="18" height="18" fill="none" stroke="#fff" strokeWidth="2.2" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" strokeLinecap="round" strokeLinejoin="round" /></svg>ยืนยันบันทึกการเบิก</>)}
          </button>
          <div style={{ color: C.textMute, fontSize: 11, textAlign: "center", marginTop: 8 }}>บันทึกแล้วข้อมูลจะถูกส่งเข้า Google Sheet และแสดงเป็นประวัติครั้งถัดไป</div>
        </div>
      </div>
    );
  }

  // ═══ SAVED CONFIRMATION ═════════════════════════════════════════
  if (page === "saved") return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%", background: C.bg, alignItems: "center", justifyContent: "center", padding: 32, textAlign: "center" }}>
      <div style={{ width: 90, height: 90, borderRadius: "50%", background: C.success + "22", display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 20, animation: "popIn 0.4s cubic-bezier(0.34,1.56,0.64,1)" }}>
        <svg width="46" height="46" fill="none" stroke={C.success} strokeWidth="3" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" strokeLinecap="round" strokeLinejoin="round" /></svg>
      </div>
      <div style={{ color: C.text, fontSize: 22, fontWeight: 700, marginBottom: 8 }}>บันทึกการเบิกเรียบร้อย</div>
      <div style={{ color: C.textSub, fontSize: 14, marginBottom: 4 }}>บันทึก {savedInfo?.count} รายการ · รวม {savedInfo?.qty} หน่วย</div>
      {savedInfo?.noUrl ? (
        <div style={{ marginBottom: 24, maxWidth: 320 }}>
          <div style={{ color: C.warning, fontSize: 12, lineHeight: 1.6, marginBottom: 10 }}>⚠ ยังไม่ได้เชื่อม Google Sheet<br />(บันทึกในเครื่องแล้ว)</div>
          <button onClick={() => { setUrlInput(getScriptUrl()); setPage("settings"); }} style={{ padding: "10px 18px", borderRadius: 12, border: "1px solid " + C.warning + "66", background: C.warning + "1A", color: C.warning, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>ตั้งค่าเชื่อม Google Sheet</button>
        </div>
      ) : savedInfo?.sheet ? (
        <div style={{ color: C.success, fontSize: 12, marginBottom: 24 }}>✓ ส่งเข้า Google Sheet แล้ว</div>
      ) : (
        <div style={{ color: C.warning, fontSize: 12, marginBottom: 24, maxWidth: 300, lineHeight: 1.6 }}>บันทึกในเครื่องแล้ว · การส่งเข้าชีตอาจไม่สำเร็จ ตรวจสอบการเชื่อมต่อ</div>
      )}
      <div style={{ display: "flex", gap: 10, width: "100%", maxWidth: 300 }}>
        <button onClick={() => setPage("historyView")} style={{ flex: 1, padding: 14, borderRadius: 14, border: "1px solid " + C.border, background: C.card, color: C.text, fontSize: 14, fontWeight: 600, cursor: "pointer" }}>ดูประวัติ</button>
        <button onClick={() => { setPage("home"); }} style={{ flex: 1, padding: 14, borderRadius: 14, border: "none", background: C.orange, color: "#fff", fontSize: 14, fontWeight: 600, cursor: "pointer" }}>กลับหน้าแรก</button>
      </div>
    </div>
  );

  // ═══ ITEMS (per category) ═══════════════════════════════════════
  const meta = CAT_META[activeCat];
  const catItems = items.filter(it => it.cat === activeCat);
  const filtered = catItems.filter(it => it.name.toLowerCase().includes(search.toLowerCase()));
  const totalCat = catItems.length;
  const needCat = catItems.filter(it => it.count < it.req).length;
  const doneCat = totalCat - needCat;

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%", background: C.bg, overflowY: "auto" }}>
      <div style={{ background: C.card, borderBottom: "1px solid " + C.border, borderTop: "3px solid " + meta.color, padding: "14px 18px", flexShrink: 0, position: "sticky", top: 0, zIndex: 10 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <button onClick={() => { setPage("pick"); setSearch(""); }} style={{ width: 36, height: 36, background: C.cardEl, border: "none", borderRadius: 10, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
              <svg width="16" height="16" fill="none" stroke={C.text} strokeWidth="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7" strokeLinecap="round" strokeLinejoin="round" /></svg>
            </button>
            <div>
              <div style={{ color: C.text, fontWeight: 600, fontSize: 15, display: "flex", alignItems: "center", gap: 7 }}><span style={{ width: 8, height: 8, borderRadius: "50%", background: meta.color, display: "inline-block" }} />{meta.label}</div>
              <div style={{ color: C.textSub, fontSize: 11, marginTop: 1 }}>{totalCat} รายการ{needCat > 0 && <span style={{ color: C.danger, marginLeft: 6 }}>· ต้องเบิก {needCat}</span>}</div>
            </div>
          </div>
          <div style={{ display: "flex", gap: 6 }}>
            <button onClick={() => openExport(activeCat)} style={{ padding: "6px 12px", background: C.orange, border: "none", borderRadius: 8, cursor: "pointer", color: "#fff", fontSize: 11, fontWeight: 600, display: "flex", alignItems: "center", gap: 4 }}>
              <svg width="12" height="12" fill="none" stroke="#fff" strokeWidth="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3" strokeLinecap="round" strokeLinejoin="round" /></svg>
              ส่งออก
            </button>
            <button onClick={() => resetCat(activeCat)} style={{ padding: "6px 12px", background: C.cardEl, border: "1px solid " + C.border, borderRadius: 8, cursor: "pointer", color: C.textSub, fontSize: 11 }}>รีเซ็ต</button>
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8, background: C.cardEl, borderRadius: 10, padding: "8px 12px", border: "1px solid " + C.border }}>
          <svg width="14" height="14" fill="none" stroke={C.textMute} strokeWidth="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" /><path d="M21 21l-4.35-4.35" strokeLinecap="round" /></svg>
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder={"ค้นหาใน " + meta.label + "..."} style={{ flex: 1, background: "none", border: "none", outline: "none", color: C.text, fontSize: 13 }} />
        </div>
      </div>

      {needCat > 0 && (
        <div onClick={() => openExport(activeCat)} style={{ margin: "12px 16px 0", background: "linear-gradient(135deg, " + meta.color + "CC, " + meta.color + "99)", borderRadius: 12, padding: "12px 16px", display: "flex", alignItems: "center", gap: 10, cursor: "pointer" }}>
          <svg width="18" height="18" fill="none" stroke="#fff" strokeWidth="2" viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" strokeLinecap="round" strokeLinejoin="round" /></svg>
          <div style={{ flex: 1, color: "#fff", fontSize: 12, fontWeight: 600 }}>สรุปยอด & ส่งออก · {meta.label}</div>
          <div style={{ background: "rgba(0,0,0,0.28)", color: "#fff", fontSize: 11, fontWeight: 700, padding: "4px 10px", borderRadius: 20 }}>ต้องเบิก {needCat}</div>
        </div>
      )}

      <div style={{ padding: "10px 16px 4px", display: "flex", alignItems: "center", gap: 8 }}>
        <div style={{ flex: 1, height: 4, background: C.cardEl, borderRadius: 2, overflow: "hidden" }}><div style={{ height: "100%", width: (totalCat ? (doneCat/totalCat)*100 : 0) + "%", background: meta.color, borderRadius: 2, transition: "width 0.3s" }} /></div>
        <span style={{ color: C.textMute, fontSize: 10 }}>{doneCat}/{totalCat}</span>
      </div>

      <div style={{ flex: 1, padding: "8px 16px 24px" }}>
        {filtered.length === 0 ? <div style={{ textAlign: "center", color: C.textMute, fontSize: 13, padding: "40px 0" }}>ไม่พบรายการ</div> :
          filtered.map(item => {
            const st = getStatus(item.count, item.req);
            const pct = Math.min(1, item.count / item.req);
            const need = Math.max(0, item.req - item.count);
            const stColor = st === "empty" ? C.danger : st === "low" ? C.warning : C.success;
            const lw = lastWithdrawMap[item.id];
            return (
              <div key={item.id} onClick={() => setModalId(item.id)} style={{ background: C.card, borderRadius: 14, padding: "14px 16px", marginBottom: 10, border: "1px solid " + (st === "empty" ? C.danger + "40" : st === "low" ? C.warning + "30" : C.border), cursor: "pointer" }}>
                <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 10 }}>
                  <div style={{ flex: 1, paddingRight: 8 }}>
                    <div style={{ color: C.text, fontSize: 14, fontWeight: 500, lineHeight: 1.4 }}>{item.name}</div>
                    <div style={{ color: C.textMute, fontSize: 11, marginTop: 3 }}>{meta.label} · ต้องมีในคลัง {item.req} {item.unit}</div>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ background: stColor + "22", color: stColor, fontSize: 10, fontWeight: 700, padding: "3px 8px", borderRadius: 6 }}>{st === "ok" ? "ครบ" : st === "low" ? "ไม่พอ" : "หมด"}</span>
                    <button onClick={(e) => { e.stopPropagation(); removeItem(item.id); }} style={{ background: "none", border: "none", cursor: "pointer", padding: 2, color: C.textMute }}>
                      <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2" /></svg>
                    </button>
                  </div>
                </div>
                <div style={{ height: 3, background: C.cardEl, borderRadius: 2, marginBottom: 12, overflow: "hidden" }}><div style={{ height: "100%", width: (pct*100) + "%", background: stColor, borderRadius: 2, transition: "width 0.2s" }} /></div>
                {lw && (
                  <div style={{ display: "flex", alignItems: "center", gap: 8, background: C.cardEl, borderRadius: 10, padding: "8px 12px", marginBottom: 12 }}>
                    <svg width="14" height="14" fill="none" stroke={C.orangeL} strokeWidth="2" viewBox="0 0 24 24" style={{ flexShrink: 0 }}><path d="M12 8v4l3 3M3 12a9 9 0 1018 0 9 9 0 00-18 0z" strokeLinecap="round" strokeLinejoin="round" /></svg>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ color: C.textMute, fontSize: 10 }}>เบิกครั้งล่าสุด</div>
                      <div style={{ color: C.textSub, fontSize: 11, marginTop: 1 }}>
                        <span style={{ color: C.orangeL, fontWeight: 600 }}>{lw.qty} {item.unit}</span>
                        <span> · {fmtDate(lw.date)}</span>
                        {lw.by ? <span> · โดย {lw.by}</span> : null}
                      </div>
                    </div>
                  </div>
                )}
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <button onClick={(e) => { e.stopPropagation(); changeCount(item.id, -1); }} style={{ width: 34, height: 34, borderRadius: 10, border: "1px solid " + C.border, background: C.cardEl, color: C.text, fontSize: 18, cursor: "pointer" }}>−</button>
                    <span style={{ color: C.text, fontSize: 16, fontWeight: 600, minWidth: 24, textAlign: "center" }}>{item.count}</span>
                    <button onClick={(e) => { e.stopPropagation(); changeCount(item.id, 1); }} style={{ width: 34, height: 34, borderRadius: 10, border: "1px solid " + C.border, background: C.cardEl, color: C.text, fontSize: 18, cursor: "pointer" }}>+</button>
                    <span style={{ color: C.textMute, fontSize: 12 }}>{item.unit}</span>
                  </div>
                  {need > 0 && <div style={{ textAlign: "right" }}><div style={{ color: C.textMute, fontSize: 10 }}>ต้องเบิก</div><div style={{ color: meta.color, fontSize: 16, fontWeight: 700 }}>{need} <span style={{ fontSize: 11 }}>{item.unit}</span></div></div>}
                </div>
                <div style={{ textAlign: "center", marginTop: 8, color: C.textMute, fontSize: 10 }}>แตะที่การ์ดเพื่อเปิดปุ่มนับใหญ่</div>
              </div>
            );
          })
        }
      </div>

      <CountModal item={modalItem} lastW={modalItem ? lastWithdrawMap[modalItem.id] : null} onClose={() => setModalId(null)} onChange={changeCount} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
